services:
  - type: web
    name: biomex-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py makemigrations --noinput && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn biomex.wsgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
