services:
  - type: web
    name: biomex-backend
    env: python
    rootDir: biomex_app/backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python manage.py makemigrations --noinput && python manage.py migrate --noinput --run-syncdb && python manage.py collectstatic --noinput
    startCommand: gunicorn biomex.wsgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
